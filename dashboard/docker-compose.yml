services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
