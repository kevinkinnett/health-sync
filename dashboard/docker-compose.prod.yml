services:
  health-sync:
    image: ghcr.io/kevinkinnett/health-sync:latest
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health-check"]
      interval: 30s
      timeout: 5s
      retries: 3
